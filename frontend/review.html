<!--TLDR: currently abondoning the idea of gallery photo upload, current input includes:
        1. restaurant name
        2. address
        3. star rating (dropdown)
        4. comments
        5. group selection (dropdown)
-->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Write Review</title>
    <link rel="stylesheet" href="globals.css" />
  </head>
  
  <body>
    <div class="phone">
      <div class="header">{% if review %}Edit Review{% else %}Write Review{% endif %}</div>

      <div class="content scroll">
        <form method="POST" action="{% if review %}/review/{{ review._id }}/edit{% else %}/review/new{% endif %}">

          <!-- Restaurant Name -->
          <label>Restaurant Name</label>
          <input
            type="text"
            name="restaurant_name"
            class="input-field"
            value="{{ review.restaurant_name if review else '' }}"
            required
          />

          <!-- Address -->
          <label>Address</label>
          <input
            type="text"
            name="address"
            class="input-field"
            value="{{ review.address if review else '' }}"
            required
          />

          <!-- Stars -->
          <label>Stars</label>
          <div style="margin: 10px 0;">
            <select name="rating" class="input-field">
              <option value="5" {% if review and review.rating == 5 %}selected{% endif %}>★★★★★</option>
              <option value="4" {% if review and review.rating == 4 %}selected{% endif %}>★★★★</option>
              <option value="3" {% if review and review.rating == 3 %}selected{% endif %}>★★★</option>
              <option value="2" {% if review and review.rating == 2 %}selected{% endif %}>★★</option>
              <option value="1" {% if review and review.rating == 1 %}selected{% endif %}>★</option>
            </select>
          </div>

          <!-- Comments -->
          <label>Comments</label>
          <textarea
            name="review_text"
            class="input-field"
            style="height: 100px;"
            required
          >{{ review.text if review else '' }}</textarea>

          <!-- Group Selection -->
          <label>Group</label>
          <select name="group" class="input-field">
            {% for g in groups %}
              <option value="{{ g._id }}" {% if review and review.group_id and str(review.group_id) == str(g._id) %}selected{% endif %}>{{ g.name }}</option>
            {% endfor %}
          </select>

          <!-- Submit -->
          <button type="submit" class="btn">{% if review %}Save changes{% else %}Submit{% endif %}</button>
        </form>
      </div>

      <div class="navbar">
        <button class="nav-btn" onclick="location.href='/'">Home</button>
        <button class="nav-btn" onclick="location.href='/review/new'">Post</button>
        <button class="nav-btn" onclick="location.href='/profile'">Profile</button>
        <button class="nav-btn" onclick="location.href='/groups'">Groups</button>
      </div>
    </div>
  </body>
</html>
