<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Group</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='globals.css') }}" />
  </head>

  <body>
    <div class="phone">
      <div class="header">Create Group</div>

      <div class="content scroll">

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="flash">
              {% for msg in messages %}
                <p>{{ msg }}</p>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}
        <div class="form-container">

          <p class="form-text">
            Create a new restaurant review group and invite others using a shareable code.
          </p>

          <form method="POST" action="/create_group">
            <label for="group-name" class="form-label">Group Name</label>
            <input
              name = "group_name"
              type="text"
              id="group-name"
              class="form-input"
              placeholder="e.g. Hoboken Foodies"
            />

            <label for="group-description" class="form-label">Description</label>
            <textarea
              name = "group_description"
              id="group-description"
              class="form-textarea"
              placeholder="Describe what this group is about..."
              rows="4"
            ></textarea>
          </form>
          

          <button class="primary-btn" type="submit">Create Group</button>
          <button class="secondary-btn" type="button" onclick="location.href='/groups'">Cancel</button>

        </div>
      </div>

      <!-- Nav Bar -->
      <div class="navbar">
        <button class="nav-btn" onclick="location.href='/'">Home</button>
        <button class="nav-btn" onclick="location.href='/review/new'">Post</button>
        <button class="nav-btn" onclick="location.href='/profile'">Profile</button>
        <button class="nav-btn" onclick="location.href='/groups'">Groups</button>
      </div>
    </div>
  </body>
</html>
