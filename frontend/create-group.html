<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Group</title>
    <link rel="stylesheet" href="globals.css" />
  </head>

  <body>
    <div class="phone">
      <div class="header">Create Group</div>

      <div class="content scroll">
        <div class="form-container">

          <p class="form-text">
            Create a new restaurant review group and invite others using a shareable code.
          </p>

          <label for="group-name" class="form-label">Group Name</label>
          <input
            type="text"
            id="group-name"
            class="form-input"
            placeholder="e.g. Hoboken Foodies"
          />

          <label for="group-description" class="form-label">Description</label>
          <textarea
            id="group-description"
            class="form-textarea"
            placeholder="Describe what this group is about..."
            rows="4"
          ></textarea>

          <button class="primary-btn">Create Group</button>
          <button class="secondary-btn">Cancel</button>

        </div>
      </div>

      <!-- Nav Bar -->
      <div class="navbar">
        <button class="nav-btn">Home</button>
        <button class="nav-btn">Post</button>
        <button class="nav-btn">Profile</button>
        <button class="nav-btn">Groups</button>
      </div>
    </div>
  </body>
</html>
