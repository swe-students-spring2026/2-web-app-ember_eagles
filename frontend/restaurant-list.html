<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurants</title>
    <link rel="stylesheet" href="globals.css" />
  </head>
  <body>
    <div class="phone">
      <div class="header header-left">Restaurants</div>
      <div class="content scroll">
        {% for r in restaurants %}
        <a href="/restaurant/{{ r._id }}" class="restaurant-card-link">
          <div class="restaurant-card">
            <div class="restaurant-title">{{ r.name }}</div>
            <div class="restaurant-rating">{% for i in range(5) %}{% if r.avg_rating and i < (r.avg_rating|round|int) %}★{% else %}☆{% endif %}{% endfor %}</div>
            <div class="restaurant-description">{{ r.address }}</div>
          </div>
        </a>
        {% else %}
        <p class="form-text">No restaurants yet. Post a review to add one.</p>
        {% endfor %}
      </div>
      <div class="navbar">
        <button class="nav-btn" onclick="location.href='/'">Home</button>
        <button class="nav-btn" onclick="location.href='/review/new'">Post</button>
        <button class="nav-btn" onclick="location.href='/profile'">Profile</button>
        <button class="nav-btn" onclick="location.href='/groups'">Groups</button>
      </div>
    </div>
  </body>
</html>
