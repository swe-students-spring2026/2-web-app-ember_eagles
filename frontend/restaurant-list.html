<!doctype html>
<html lang="en">
  <!-- Boilerplate -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant List</title>
    <link rel="stylesheet" href="globals.css" />
  </head>

  <body>
    <div class="phone">
      <div class="header header-left">Restaurants</div>

      <!-- allows scrolling -->
      <div class="content scroll">
        <!-- TODO: filter (may abaondon it, but could also just do a simple filter via group later) -->
         
        <!-- attempt at backend integration -->
        {% for r in restaurants %}
        <div class="restaurant-card">
          <div class="restaurant-title">{{ r.name }}</div>
          <div class="restaurant-rating">
            {{ "★" * r.avg_rating|round|int }}
          </div>
          <div class="restaurant-description">
            Lorem ipsum dolor sit amet, consectetuer adipiscing elit.
          </div>
          <div class="restaurant-user">Posted by {{ r.last_user }}</div>
          <div class="restaurant-date">{{ r.last_review_date }}</div>
        </div>
        {% endfor %}

      </div>

      <!-- Nav Bar -->
      <div class="navbar">
        <button class="nav-btn">Home</button>
        <button class="nav-btn">Post</button>
        <button class="nav-btn">Profile</button>
        <button class="nav-btn">Groups</button>
      </div>
    </div>
  </body>
</html>
