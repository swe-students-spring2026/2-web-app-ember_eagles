<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Profile</title>
<link rel="stylesheet" href="{{ url_for('static', filename='globals.css') }}" />
</head>
<body>

<div class="phone">
  <div class="header" id="pageTitle">Profile Page</div>
  <div class="content">

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">
          {% for msg in messages %}
            <p>{{ msg }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <div id="profileSection">
      <div class="avatar"></div>
      <div class="username" id="displayUsername">{{ user.username }}</div>
      <a class="btn" href="/review">View Own Reviews</a>
      <a class="btn" href="/groups">View Joined Groups</a>
      <button class="btn" onclick="showEdit()">Edit</button>
    </div>

    <div id="editSection">
      <div class="avatar"></div>
      <form method="POST" action="/profile">
        <input name="username" type="text" id="editUsername" class="input-field" value="{{ user.username }}">
        <input name="password" type="password" id="editPassword" class="input-field" placeholder="New password" autocomplete="new-password">
        <button class="btn" type="submit">Save</button>
        <button class="btn" type="button" onclick="cancelEdit()">Cancel</button>
      </form>
      
    </div>

  </div>
  <div class="navbar">
        <button class="nav-btn" onclick="location.href='/'">Home</button>
        <button class="nav-btn" onclick="location.href='/review/new'">Post</button>
        <button class="nav-btn" onclick="location.href='/profile'">Profile</button>
        <button class="nav-btn" onclick="location.href='/groups'">Groups</button>
      </div>
</div>

<script>
function showEdit() {
  document.getElementById("profileSection").style.display = "none";
  document.getElementById("editSection").style.display = "block";
  document.getElementById("pageTitle").textContent = "Edit Profile";
  document.getElementById("editUsername").value = document.getElementById("displayUsername").textContent;
  document.getElementById("editPassword").value = "";
}

function cancelEdit() {
  document.getElementById("editSection").style.display = "none";
  document.getElementById("profileSection").style.display = "block";
  document.getElementById("pageTitle").textContent = "Profile Page";
}
</script>

</body>
</html>
