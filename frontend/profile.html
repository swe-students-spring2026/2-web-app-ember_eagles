<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Profile</title>
<link rel="stylesheet" href="globals.css" />
</head>
<body>

<div class="phone">
  <div class="header" id="pageTitle">Profile Page</div>
  <div class="content">

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">
          {% for msg in messages %}
            <p>{{ msg }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <div id="profileSection">
      <div class="avatar"></div>
      <div class="username" id="displayUsername">{{ user.username }}</div>
      <div class="password" id="displayPassword">{{ user.password }}</div>
      <a class="btn" href="/review">View Own Reviews</a>
      <a class="btn" href="/groups">View Joined Groups</a>
      <button class="btn" onclick="showEdit()">Edit</button>
    </div>

    <div id="editSection">
      <div class="avatar"></div>
      <form method="POST" action="/profile">
        <input type="text" id="editUsername" class="input-field" placeholder="Username" value="{{ user.username }}">
        <input type="password" id="editPassword" class="input-field" placeholder="Password" value="{{ user.password }}">
        <button class="btn" type="submit">Save</button>
        <button class="btn" type="button" onclick="cancelEdit()">Cancel</button>
      </form>
      
    </div>

  </div>
  <div class="navbar">
    <button class="nav-btn">Home</button>
    <button class="nav-btn">Post</button>
    <button class="nav-btn">Profile</button>
    <button class="nav-btn">Groups</button>
  </div>
</div>

<script>
function showEdit() {
  document.getElementById("profileSection").style.display = "none";
  document.getElementById("editSection").style.display = "block";
  document.getElementById("pageTitle").textContent = "Edit Profile";
  document.getElementById("editUsername").value = document.getElementById("displayUsername").textContent;
  document.getElementById("editPassword").value = document.getElementById("displayPassword").textContent;
}

function cancelEdit() {
  document.getElementById("editSection").style.display = "none";
  document.getElementById("profileSection").style.display = "block";
  document.getElementById("pageTitle").textContent = "Profile Page";
}
</script>

</body>
</html>
