<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Login</title>
</head>
<body>
  <h1>Login</h1>

  <!-- flash message -->
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <ul>
        {% for msg in messages %}
          <li>{{ msg }}</li>
        {% endfor %}
      </ul>
    {% endif %}
  {% endwith %}

  <form method="POST" action="/login">
    <label>Username</label>
    <input name="username" type="text" />

    <label>Password</label>
    <input name="password" type="password" />

    <button type="submit">Log in</button>
  </form>
</body>
</html>
