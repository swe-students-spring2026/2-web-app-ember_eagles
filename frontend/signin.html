<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login / Signup</title>
<link rel="stylesheet" href="{{ url_for('static', filename='globals.css') }}" />
</head>
<body>

<div class="wrapper">

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="flash">
        {% for msg in messages %}
          <p>{{ msg }}</p>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <div class="forms" id="formContainer" {% if initial_form == 'signup' %}style="transform: translateX(-320px);"{% endif %}>

    <div class="card">
      <h1>Welcome Back!</h1>

      <form method="POST" action="/login">
        <input name="username" type="text" class="input-field" placeholder="username">
        <input name="password" type="password" class="input-field" placeholder="password">
        <button class="btn">Login</button>
      </form>
      
      <div class="switch-text">
        Don't have an account? <br>
        <span onclick="signup()">Sign Up</span>
      </div>
    </div>

    <div class="card">
      <h1>New Here?</h1>
      <form method="POST" action="/signup">
        <input name="username" type="text" class="input-field" placeholder="username">
        <input name="password" type="password" class="input-field" placeholder="password">
        <button class="btn">Sign Up</button>
      </form>
      <div class="switch-text">
        Have an account? <br>
        <span onclick="login()">Login</span>
      </div>
    </div>

  </div>
</div>

<script>
function signup() {
  document.getElementById("formContainer").style.transform = "translateX(-320px)";
}
function login() {
  document.getElementById("formContainer").style.transform = "translateX(0)";
}
</script>

</body>
</html>
